services:
    php:
        build:
            context: .
            dockerfile: Dockerfile
            target: php-dev
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            - db
        environment:
            SYMFONY_HOME: /tmp/.symfony5

    nginx:
        image: nginx:1
        ports:
            - 8000:80
            - 8443:443
        volumes:
            - ./:/var/www/html
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
            - ./nginx/ssl:/etc/ssl
        depends_on:
            - php

    db:
        image: mariadb:latest
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: symfony_train_deploy
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3308:3306"

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "8081:80"
        depends_on:
            - db
    node:
        build:
            context: .
            dockerfile: Dockerfile
            target: node-dev
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        tty: true
        command: sh -c "yarn && yarn watch"

    mailpit:
        image: axllent/mailpit
        ports:
            - 8025:8025


volumes:
    db_data: