<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 460" width="300" height="460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e1f"/>
      <stop offset="100%" stop-color="#13131f"/>
    </linearGradient>
    <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B6A0FF"/>
      <stop offset="100%" stop-color="#00E3FD"/>
    </linearGradient>
  </defs>

  <rect width="300" height="450" fill="url(#bg)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- arc simple -->
  <circle cx="150" cy="200" r="52" fill="none" stroke="url(#arc-grad)" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="220 107" stroke-linecap="round" transform="rotate(-90 150 200)" style="fill:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-dasharray:220px, 107px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- play -->
  <polygon points="143,188 143,212 166,200" fill="none" stroke="url(#arc-grad)" stroke-width="1.5" stroke-linejoin="round" stroke-opacity="0.8" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- texte -->
  <text x="150" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#B6A0FF" fill-opacity="0.45" letter-spacing="3" style="fill:rgb(182, 160, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:11px;font-weight:500;text-anchor:middle;dominant-baseline:auto">AUCUNE IMAGE</text>
</svg>